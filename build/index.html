<body class="bg-gray-100 text-gray-800">

                    <input type="file" id="residents-input" accept=".xlsx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100">

            <div class="bg-white p-6 rounded-lg shadow-md">
                <label for="projets-input" class="block text-lg font-medium text-gray-700 mb-2">Fichier Projets (XLSX):</label>
                <div class="flex items-center">
                    <input type="file" id="projets-input" accept=".xlsx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100">
                    <span id="projets-validation-indicator" class="ml-2"></span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">

                <div class="flex items-center">
                    <input type="file" id="vie-sociale-input" accept=".xlsx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100">
                    <span id="vie-sociale-validation-indicator" class="ml-2"></span>

        <div class="mt-8 text-center">
            <button id="filter-error-button" class="bg-red-500 text-white px-6 py-3 rounded-md hover:bg-red-600 text-lg">Filter Errors</button>
            <button id="filter-warning-button" class="bg-yellow-500 text-white px-6 py-3 rounded-md hover:bg-yellow-600 text-lg ml-4">Filter Warnings</button>
            <button id="print-table-button" class="bg-blue-500 text-white px-6 py-3 rounded-md hover:bg-blue-600 text-lg ml-4">Imprimer</button>
        </div>

        <div id="table-container" class="mt-8 bg-white p-6 rounded-lg shadow-md"></div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>function extractName(fullName) {
  if (!fullName) {
    return '';
  }

  let processedName = String(fullName);

  // Remove titles like "Mme.", "M.", "MR"
  processedName = processedName.replace(/^(Mme|M|MR)\.?\s+/, '');

  // Stop at "Née"
  const neeIndex = processedName.indexOf('Née');
  if (neeIndex > -1) {
    processedName = processedName.substring(0, neeIndex);
  }

  // Stop at a comma, which often separates other names
  const commaIndex = processedName.indexOf(',');
  if (commaIndex > -1) {
    processedName = processedName.substring(0, commaIndex);
  }

  // Stop at parenthesis
  const parenthesisIndex = processedName.indexOf('(');
  if (parenthesisIndex > -1) {
    processedName = processedName.substring(0, parenthesisIndex);
  }

  // Trim any remaining whitespace
  return processedName.trim();
}

function toISODateString(date) {
    if (!date) {
        return null;
    }

    let d;
    if (date instanceof Date) {
        d = date;
    } else if (typeof date === 'string' && date.includes('/')) {
        const parts = date.split('/');
        if (parts.length === 3) {
            // Assuming DD/MM/YYYY
            const day = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10) - 1; // Month is 0-indexed
            const year = parseInt(parts[2], 10);
            d = new Date(Date.UTC(year, month, day));
        } else {
            d = new Date(date); // Fallback for other string formats
        }
    } else if (typeof date === 'number') {
        // It could be an Excel serial number.
        d = new Date(Math.round((date - 25569) * 86400 * 1000));
    }
    else {
        d = new Date(date); // Fallback for other types
    }

    // Check if the date is valid
    if (isNaN(d.getTime())) {
        return null;
    }

    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

function processResidentsFile(file) {
    return new Promise((resolve, reject) => {
        if (!file) {
            return reject(new Error('No file selected.'));
        }

        const reader = new FileReader();

        reader.onload = (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { cellDates: true });

                if (jsonData.length > 0) {
                    const firstRow = jsonData[0];
                    if (!('Résident' in firstRow && 'Entrée' in firstRow && 'N° de chambre' in firstRow)) {
                        return reject(new Error('Le fichier Résidents ne contient pas les colonnes attendues.'));
                    }
                }

                const formattedData = jsonData.map(row => {
                    let entryDate = row["Entrée"];
                    // The robust toISODateString now handles numbers, so this inline check is no longer needed.
                    // However, to minimize changes, we'll leave it. The function is idempotent.
                    if (typeof entryDate === 'number') {
                        entryDate = new Date(Math.round((entryDate - 25569) * 86400 * 1000));
                    }
                    return {
                        "id": extractName(row["Résident"]),
                        "entry": toISODateString(entryDate),
                        "chNum": row["N° de chambre"]
                    };
                });

                resolve(formattedData);
            } catch (error) {
                reject(error);
            }
        };

        reader.onerror = (error) => {
            reject(error);
        };

        reader.readAsArrayBuffer(file);
    });
}

if (typeof module !== 'undefined' && module.exports) {
    module.exports = {
        extractName,
        processResidentsFile,
        processProjetsFile,
        processVieSocialeFile,
    };
}

function processProjetsFile(file) {
    return new Promise((resolve, reject) => {
        if (!file) {
            return reject(new Error('No file selected.'));
        }

        const reader = new FileReader();

        reader.onload = (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { cellDates: true });

                if (jsonData.length > 0) {
                    const firstRow = jsonData[0];
                    if (!('Résident' in firstRow && 'Libellé' in firstRow && 'Étape' in firstRow && 'Du' in firstRow && 'Au' in firstRow)) {
                        return reject(new Error('Le fichier Projets ne contient pas les colonnes attendues.'));
                    }
                }

                const formattedData = jsonData.map(row => ({
                    "id": extractName(row["Résident"]),
                    "type": row["Libellé"],
                    "state": row["Étape"],
                    "from": toISODateString(row["Du"]),
                    "to": toISODateString(row["Au"])
                }));

                resolve(formattedData);
            } catch (error) {
                reject(error);
            }
        };

        reader.onerror = (error) => {
            reject(error);
        };

        reader.readAsArrayBuffer(file);
    });
}

function processVieSocialeFile(file) {
    return new Promise((resolve, reject) => {
        if (!file) {
            return reject(new Error('No file selected.'));
        }

        const reader = new FileReader();

        reader.onload = (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const sheetData = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: false });

                if (sheetData.length < 2) {
                    return reject(new Error('Le fichier Vie Sociale ne contient pas de données.'));
                }

                const formattedData = [];
                let currentResident = null;
                // Start from 1 to skip header row
                for (let i = 1; i < sheetData.length; i++) {
                    const row = sheetData[i];
                    // Resident name is in the first column and the rest are empty
                    if (row[0] && row[1] === undefined) {
                        currentResident = extractName(row[0]);
                    } else if (currentResident && row[1] && row[2]) { // Make sure date and type are not empty
                        formattedData.push({
                            "id": currentResident,
                            "type": row[2], // "motif" is in the third column
                            "date": toISODateString(row[1])  // "date" is in the second column
                        });
                    }
                }

                if (formattedData.length === 0) {
                    return reject(new Error("Aucune donnée valide n'a été trouvée dans le fichier Vie Sociale."));
                }

                resolve(formattedData);
            } catch (error) {
                reject(error);
            }
        };

        reader.onerror = (error) => {
            reject(error);
        };

        reader.readAsArrayBuffer(file);
    });
}
</script>
    <script>class Data {
    constructor(resident) {
        this.resident = resident;
        if (this.resident.entry) {
            this.resident.entry = new Date(this.resident.entry);
        }
        this.projets = [];
        this.vieSociale = [];
    }

    addProjet(projet) {
        if (projet.from) {
            projet.from = new Date(projet.from);
        }
        if (projet.to) {
            projet.to = new Date(projet.to);
        }
        this.projets.push(projet);
    }

    addVieSociale(event) {
        if (event.date) {
            event.date = new Date(event.date);
        }
        this.vieSociale.push(event);
    }

    get status() {
        const statuses = [
            this.signedProjectStatus,
            this.draftProjectStatus,
            this.ppEtConsentementStatus,
            this.bilanIntegrationStatus,
            this.medicalProjetLastYearStatus
        ];

        if (statuses.includes('error')) {
            return 'error';
        }
        if (statuses.includes('warning')) {
            return 'warning';
        }
        return 'success';
    }

    get statusReasons() {
        const reasons = [];
        if (this.signedProjectStatus === 'error') {
            reasons.push('Le nombre de projets signés de moins d\'un an est inférieur à 3.');
        }
        if (this.draftProjectStatus === 'warning') {
            reasons.push('Il y a des projets en état de brouillon de moins d\'un an.');
        }
        if (this.ppEtConsentementStatus === 'error') {
            reasons.push('PP et consentement manquant.');
        }
        if (this.bilanIntegrationStatus === 'error') {
            reasons.push('Bilan d\'intégration manquant.');
        }
        if (this.medicalProjetLastYearStatus === 'error') {
            reasons.push('Projet médical de moins d\'un an manquant.');
        }
        return reasons;
    }

    get signedProjectStatus() {
        return this.projectsByStatus.signedLastYear < 3 ? 'error' : 'normal';
    }

    get draftProjectStatus() {
        return this.draftProjectsLastYear > 0 ? 'warning' : 'normal';
    }

    get ppEtConsentementStatus() {
        return this.hasPpEtConsentement ? 'normal' : 'error';
    }

    get bilanIntegrationStatus() {
        return this.hasBilanIntegration ? 'normal' : 'error';
    }

    get medicalProjetLastYearStatus() {
        return this.hasMedicalProjetLastYear ? 'normal' : 'error';
    }

    get projectsCount() {
        return this.projets.length;
    }

    get signatureProjetsCount() {
        return this.projets.filter(p => p.state && p.state.trim() === 'Signature').length;
    }

    get brouillonProjetsCount() {
        return this.projets.filter(p => p.state && p.state.trim() === 'Brouillon').length;
    }

    get draftProjectsLastYear() {
        const today = new Date();
        const oneYearAgo = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());
        return this.projets.filter(p => {
            if (!p.state || p.state.trim() !== 'Brouillon') return false;
            return p.from && p.from >= oneYearAgo;
        }).length;
    }

    get projectsByStatus() {
        const today = new Date();
        const oneYearAgo = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());

        const statusCounts = {
            signedLastYear: 0,
            onGoing: 0,
            finished: 0,
            future: 0,
            draft: this.brouillonProjetsCount,
            signed: this.signatureProjetsCount,
        };

        this.projets.forEach(p => {
            if (!p.state) return;
            const state = p.state.trim();
            if (state === 'Signature' && p.from >= oneYearAgo) {
                statusCounts.signedLastYear++;
            }
            if (state === 'En cours') {
                statusCounts.onGoing++;
            }
            if (state === 'Clôture') { // Corrected keyword
                statusCounts.finished++;
            }
            if (state === 'À venir') {
                statusCounts.future++;
            }
        });

        return statusCounts;
    }

    get hasPpEtConsentement() {
        return this.vieSociale.some(v => v.type === 'PP - Présentation et Consentement');
    }

    get hasBilanIntegration() {
        return this.vieSociale.some(v => v.type === 'Bilan d’intégration');
    }

    get hasMedicalProjetLastYear() {
        const today = new Date();
        const oneYearAgo = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());
        return this.projets.some(p => {
            if (p.type !== 'Prise en charge médicale') return false;
            // Assuming 'from' date should be within the last year
            return p.from && p.from >= oneYearAgo;
        });
    }
}
</script>
    <script>document.addEventListener('DOMContentLoaded', () => {
    const tableContainer = document.getElementById('table-container');
    const printTableButton = document.getElementById('print-table-button');
    const filterErrorButton = document.getElementById('filter-error-button');
    const filterWarningButton = document.getElementById('filter-warning-button');

    const residentsInput = document.getElementById('residents-input');
    const projetsInput = document.getElementById('projets-input');
    const vieSocialeInput = document.getElementById('vie-sociale-input');

    let tableData = {
        residents: null,
        projets: null,
        vieSociale: null
    };

    let files = {
        residents: null,
        projets: null,
        vieSociale: null
    }

    let currentFilter = null;

    function generateTable(residents, projets, vieSociale) {
        tableContainer.innerHTML = ''; // Clear previous table
        if (!residents || !projets || !vieSociale) {
            tableContainer.textContent = 'Veuillez charger tous les fichiers de données avant de générer le tableau.';
            return;
        }

        const combinedData = new Map();

        // 1. Initialize with resident data and create Data instances
        residents.forEach(resident => {
            combinedData.set(resident.id, new Data(resident));
        });

        // 2. Add projects to residents
        projets.forEach(projet => {
            if (combinedData.has(projet.id)) {
                combinedData.get(projet.id).addProjet(projet);
            }
        });

        // 3. Add social life events to residents
        vieSociale.forEach(event => {
            if (combinedData.has(event.id)) {
                combinedData.get(event.id).addVieSociale(event);
            }
        });

        // 4. Generate the table
        console.log('combinedData:', combinedData);
        const table = document.createElement('table');
        table.className = 'min-w-full divide-y divide-gray-200';

        // Table header
        const thead = table.createTHead();
        thead.className = 'bg-gray-50';
        const headerRow = thead.insertRow();
        const headers = [
            { text: 'Aide', sortable: false },
            { text: 'ID', sortable: true },
            { text: 'Date d\'entrée', sortable: true },
            { text: 'Chambre', sortable: true },
            { text: 'Projets signés (-1 an)', sortable: true },
            { text: 'Projets Brouillon de moins d\'un an', sortable: true },
            { text: 'PP et Consentement', sortable: true },
            { text: 'Bilan d\'intégration', sortable: true },
            { text: 'Projet Médical (-1 an)', sortable: true }
        ];

        headers.forEach((header, index) => {
            const th = document.createElement('th');
            th.className = 'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider';
            th.textContent = header.text;
            if (header.sortable) {
                th.style.cursor = 'pointer';
                th.addEventListener('click', () => sortTable(index));
            }
            headerRow.appendChild(th);
        });

        // Table body
        const tbody = table.createTBody();
        tbody.className = 'bg-white divide-y divide-gray-200';
        let sortedData = Array.from(combinedData.values());

        if (currentFilter) {
            sortedData = sortedData.filter(data => data.status === currentFilter);
        }

        function defaultSort(data) {
            const statusOrder = { 'error': 1, 'warning': 2, 'success': 3 };

            return data.sort((a, b) => {
                // 1. Sort by status
                const statusComparison = statusOrder[a.status] - statusOrder[b.status];
                if (statusComparison !== 0) return statusComparison;

                // 2. Sort by entry date (newest to oldest)
                const entryComparison = b.resident.entry - a.resident.entry;
                if (entryComparison !== 0) return entryComparison;

                // 3. Sort by last project date (oldest to newest)
                const lastProjectA = a.projets.length > 0 ? a.projets.reduce((latest, p) => p.from > latest ? p.from : latest, a.projets[0].from) : null;
                const lastProjectB = b.projets.length > 0 ? b.projets.reduce((latest, p) => p.from > latest ? p.from : latest, b.projets[0].from) : null;

                if (lastProjectA && lastProjectB) {
                    return lastProjectA - lastProjectB;
                } else if (lastProjectA) {
                    return -1;
                } else if (lastProjectB) {
                    return 1;
                }

                return 0;
            });
        }

        defaultSort(sortedData);

        function formatDate(date) {
            if (!date) return '';
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function applyStatusColor(element, status) {
            if (status === 'error') {
                element.classList.add('bg-red-200');
            } else if (status === 'warning') {
                element.classList.add('bg-yellow-200');
            }
        }

        function renderTable(dataToRender) {
            tbody.innerHTML = ''; // Clear existing rows
            dataToRender.forEach(data => {
                const row = tbody.insertRow();

                // Apply row status colors
                if (data.status === 'error') {
                    row.className = 'bg-red-100';
                } else if (data.status === 'warning') {
                    row.className = 'bg-yellow-100';
                }

                const cellClasses = 'px-6 py-4 whitespace-nownowrap text-sm text-gray-900';

                const helpCell = row.insertCell();
                helpCell.className = cellClasses;
                if (data.status === 'error' || data.status === 'warning') {
                    const icon = document.createElement('span');
                    icon.textContent = '❓';
                    icon.title = data.statusReasons.join('\n');
                    helpCell.appendChild(icon);
                }

                const idCell = row.insertCell();
                idCell.className = cellClasses;
                idCell.textContent = data.resident.id;

                const entryCell = row.insertCell();
                entryCell.className = cellClasses;
                entryCell.textContent = formatDate(data.resident.entry);

                const chNumCell = row.insertCell();
                chNumCell.className = cellClasses;
                chNumCell.textContent = data.resident.chNum;

                const signedLastYearCell = row.insertCell();
                signedLastYearCell.className = cellClasses;
                signedLastYearCell.textContent = data.projectsByStatus.signedLastYear;
                applyStatusColor(signedLastYearCell, data.signedProjectStatus);


                const draftLastYearCell = row.insertCell();
                draftLastYearCell.className = cellClasses;
                draftLastYearCell.textContent = data.draftProjectsLastYear;
                applyStatusColor(draftLastYearCell, data.draftProjectStatus);

                const ppEtConsentementCell = row.insertCell();
                ppEtConsentementCell.className = cellClasses;
                ppEtConsentementCell.textContent = data.hasPpEtConsentement ? 'Oui' : 'Non';
                applyStatusColor(ppEtConsentementCell, data.ppEtConsentementStatus);


                const bilanIntegrationCell = row.insertCell();
                bilanIntegrationCell.className = cellClasses;
                bilanIntegrationCell.textContent = data.hasBilanIntegration ? 'Oui' : 'Non';
                applyStatusColor(bilanIntegrationCell, data.bilanIntegrationStatus);


                const medicalProjetCell = row.insertCell();
                medicalProjetCell.className = cellClasses;
                medicalProjetCell.textContent = data.hasMedicalProjetLastYear ? 'Oui' : 'Non';
                applyStatusColor(medicalProjetCell, data.medicalProjetLastYearStatus);
            });
        }

        let sortDirection = 'asc';

        function sortTable(columnIndex) {
            const isAsc = sortDirection === 'asc';
            sortDirection = isAsc ? 'desc' : 'asc';

            sortedData.sort((a, b) => {
                let valA, valB;

                switch (columnIndex) {
                    case 1:
                        valA = a.resident.id;
                        valB = b.resident.id;
                        break;
                    case 2:
                        valA = a.resident.entry;
                        valB = b.resident.entry;
                        break;
                    case 3:
                        valA = a.resident.chNum;
                        valB = b.resident.chNum;
                        break;
                    case 4:
                        valA = a.projectsByStatus.signedLastYear;
                        valB = b.projectsByStatus.signedLastYear;
                        break;
                    case 5:
                        valA = a.draftProjectsLastYear;
                        valB = b.draftProjectsLastYear;
                        break;
                    case 6:
                        valA = a.hasPpEtConsentement;
                        valB = b.hasPpEtConsentement;
                        break;
                    case 7:
                        valA = a.hasBilanIntegration;
                        valB = b.hasBilanIntegration;
                        break;
                    case 8:
                        valA = a.hasMedicalProjetLastYear;
                        valB = b.hasMedicalProjetLastYear;
                        break;
                }

                if (valA < valB) {
                    return isAsc ? -1 : 1;
                }
                if (valA > valB) {
                    return isAsc ? 1 : -1;
                }
                return 0;
            });

            renderTable(sortedData);
        }

        renderTable(sortedData);

        tableContainer.appendChild(table);
    }

    // Load default data
    Promise.all([
        fetch('residents.json').then(response => response.json()),
        fetch('projets.json').then(response => response.json()),
        fetch('vie_sociale.json').then(response => response.json())
    ])
    .then(([residentsData, projetsData, vieSocialeData]) => {
        tableData = {
            residents: residentsData['Résidents'],
            projets: projetsData['Projets'],
            vieSociale: vieSocialeData['Vie Sociale']
        };
        generateTable(tableData.residents, tableData.projets, tableData.vieSociale);
    })
    .catch(error => {
        console.error('Erreur lors du chargement des données par défaut:', error);
        tableContainer.textContent = 'Erreur lors du chargement des données par défaut. Veuillez vérifier la console.';
    });

    function setValidationIndicator(input, isValid) {
        const parentDiv = input.parentElement.parentElement;
        parentDiv.classList.remove('bg-white', 'bg-green-100', 'bg-red-100');
        if (isValid === true) {
            parentDiv.classList.add('bg-green-100');
        } else if (isValid === false) {
            parentDiv.classList.add('bg-red-100');
        } else {
            parentDiv.classList.add('bg-white');
        }
    }

    async function handleFileSelect(event, type, processor) {
        const file = event.target.files[0];
        const input = event.target;
        if (!file) {
            setValidationIndicator(input, null);
            files[type] = null;
            return;
        }

        try {
            const data = await processor(file);
            console.log(`JSON pour ${type}:`, data);
            tableData[type] = data;
            files[type] = file;
            setValidationIndicator(input, true);
            checkAndGenerateTable();
        } catch (error) {
            console.error(`Erreur de traitement du fichier pour ${type}:`, error);
            setValidationIndicator(input, false);
            files[type] = null;
        }
    }

    residentsInput.addEventListener('change', (e) => handleFileSelect(e, 'residents', processResidentsFile));
    projetsInput.addEventListener('change', (e) => handleFileSelect(e, 'projets', processProjetsFile));
    vieSocialeInput.addEventListener('change', (e) => handleFileSelect(e, 'vieSociale', processVieSocialeFile));


    function checkAndGenerateTable() {
        if (tableData.residents && tableData.projets && tableData.vieSociale) {
            generateTable(tableData.residents, tableData.projets, tableData.vieSociale);
        }
    }

    printTableButton.addEventListener('click', () => {
        window.print();
    });

    filterErrorButton.addEventListener('click', () => {
        currentFilter = currentFilter === 'error' ? null : 'error';
        generateTable(tableData.residents, tableData.projets, tableData.vieSociale);
    });

    filterWarningButton.addEventListener('click', () => {
        currentFilter = currentFilter === 'warning' ? null : 'warning';
        generateTable(tableData.residents, tableData.projets, tableData.vieSociale);
    });
});
</script>
</body>
</html>
