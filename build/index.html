<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Suivi des Résidents</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="container mx-auto p-8">
        <h1 class="text-4xl font-bold text-center mb-8">Tableau de Suivi des Résidents</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <label for="residents-input" class="block text-lg font-medium text-gray-700 mb-2">Fichier Résidents (XLSX):</label>
                <input type="file" id="residents-input" accept=".xlsx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100">
                <button id="residents-json-button" class="mt-4 bg-violet-500 text-white px-4 py-2 rounded-md hover:bg-violet-600">Voir JSON</button>
                <pre id="residents-json-output" class="mt-4 bg-gray-50 p-4 rounded-md overflow-x-auto"></pre>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <label for="projets-input" class="block text-lg font-medium text-gray-700 mb-2">Fichier Projets (XLSX):</label>
                <input type="file" id="projets-input" accept=".xlsx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100">
                <button id="projets-json-button" class="mt-4 bg-violet-500 text-white px-4 py-2 rounded-md hover:bg-violet-600">Voir JSON</button>
                <pre id="projets-json-output" class="mt-4 bg-gray-50 p-4 rounded-md overflow-x-auto"></pre>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <label for="vie-sociale-input" class="block text-lg font-medium text-gray-700 mb-2">Fichier Vie Sociale (XLSX):</label>
                <input type="file" id="vie-sociale-input" accept=".xlsx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100">
                <button id="vie-sociale-json-button" class="mt-4 bg-violet-500 text-white px-4 py-2 rounded-md hover:bg-violet-600">Voir JSON</button>
                <pre id="vie-sociale-json-output" class="mt-4 bg-gray-50 p-4 rounded-md overflow-x-auto"></pre>
            </div>
        </div>

        <div class="mt-8 text-center">
            <button id="generate-table-button" class="bg-green-500 text-white px-6 py-3 rounded-md hover:bg-green-600 text-lg">Générer le tableau</button>
        </div>

        <div id="table-container" class="mt-8 bg-white p-6 rounded-lg shadow-md"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>function extractName(fullName) {
  if (!fullName) {
    return '';
  }

  let processedName = String(fullName);

  // Remove titles like "Mme.", "M.", "MR"
  processedName = processedName.replace(/^(Mme|M|MR)\.?\s+/, '');

  // Stop at "Née"
  const neeIndex = processedName.indexOf('Née');
  if (neeIndex > -1) {
    processedName = processedName.substring(0, neeIndex);
  }

  // Stop at a comma, which often separates other names
  const commaIndex = processedName.indexOf(',');
  if (commaIndex > -1) {
    processedName = processedName.substring(0, commaIndex);
  }

  // Stop at parenthesis
  const parenthesisIndex = processedName.indexOf('(');
  if (parenthesisIndex > -1) {
    processedName = processedName.substring(0, parenthesisIndex);
  }

  // Trim any remaining whitespace
  return processedName.trim();
}

function processResidentsFile(file) {
    return new Promise((resolve, reject) => {
        if (!file) {
            return reject(new Error('No file selected.'));
        }

        const reader = new FileReader();

        reader.onload = (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                const formattedData = jsonData.map(row => ({
                    "id": extractName(row["Résident"]),
                    "entry": row["Entrée"],
                    "chNum": row["N° de chambre"]
                }));

                resolve(formattedData);
            } catch (error) {
                reject(error);
            }
        };

        reader.onerror = (error) => {
            reject(error);
        };

        reader.readAsArrayBuffer(file);
    });
}

function processProjetsFile(file) {
    return new Promise((resolve, reject) => {
        if (!file) {
            return reject(new Error('No file selected.'));
        }

        const reader = new FileReader();

        reader.onload = (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                const formattedData = jsonData.map(row => ({
                    "id": extractName(row["Résident"]),
                    "type": row["Libellé"],
                    "state": row["Étape"],
                    "from": row["Du"],
                    "to": row["Au"]
                }));

                resolve(formattedData);
            } catch (error) {
                reject(error);
            }
        };

        reader.onerror = (error) => {
            reject(error);
        };

        reader.readAsArrayBuffer(file);
    });
}

function processVieSocialeFile(file) {
    return new Promise((resolve, reject) => {
        if (!file) {
            return reject(new Error('No file selected.'));
        }

        const reader = new FileReader();

        reader.onload = (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const sheetData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                const formattedData = [];
                let currentResident = null;
                // Start from 1 to skip header row
                for (let i = 1; i < sheetData.length; i++) {
                    const row = sheetData[i];
                    // Resident name is in the first column and the rest are empty
                    if (row[0] && row[1] === undefined) {
                        currentResident = extractName(row[0]);
                    } else if (currentResident && row[1] && row[2]) { // Make sure date and type are not empty
                        formattedData.push({
                            "id": currentResident,
                            "type": row[2], // "motif" is in the third column
                            "date": row[1]  // "date" is in the second column
                        });
                    }
                }

                resolve(formattedData);
            } catch (error) {
                reject(error);
            }
        };

        reader.onerror = (error) => {
            reject(error);
        };

        reader.readAsArrayBuffer(file);
    });
}
</script>
    <script>class Data {
    constructor(resident) {
        this.resident = resident;
        this.projets = [];
        this.vieSociale = [];
    }

    addProjet(projet) {
        this.projets.push(projet);
    }

    addVieSociale(event) {
        this.vieSociale.push(event);
    }

    get status() {
        if (this.projets.some(p => p.state === 'En cours' && new Date(p.to) < new Date())) {
            return 'error';
        }
        if (this.projets.length === 0) {
            return 'success';
        }
        if (this.projets.some(p => p.state === 'En cours' || p.state === 'À venir')) {
            return 'success';
        }
        return 'warning';
    }
}
</script>
    <script>document.addEventListener('DOMContentLoaded', () => {
    const tableContainer = document.getElementById('table-container');
    const generateTableButton = document.getElementById('generate-table-button');

    const residentsInput = document.getElementById('residents-input');
    const residentsJsonButton = document.getElementById('residents-json-button');
    const residentsJsonOutput = document.getElementById('residents-json-output');

    const projetsInput = document.getElementById('projets-input');
    const projetsJsonButton = document.getElementById('projets-json-button');
    const projetsJsonOutput = document.getElementById('projets-json-output');

    const vieSocialeInput = document.getElementById('vie-sociale-input');
    const vieSocialeJsonButton = document.getElementById('vie-sociale-json-button');
    const vieSocialeJsonOutput = document.getElementById('vie-sociale-json-output');

    let tableData = {
        residents: null,
        projets: null,
        vieSociale: null
    };

    function generateTable(residents, projets, vieSociale) {
        tableContainer.innerHTML = ''; // Clear previous table
        if (!residents || !projets || !vieSociale) {
            tableContainer.textContent = 'Veuillez charger tous les fichiers de données avant de générer le tableau.';
            return;
        }

        const combinedData = new Map();

        // 1. Initialize with resident data and create Data instances
        residents.forEach(resident => {
            combinedData.set(resident.id, new Data(resident));
        });

        // 2. Add projects to residents
        projets.forEach(projet => {
            if (combinedData.has(projet.id)) {
                combinedData.get(projet.id).addProjet(projet);
            }
        });

        // 3. Add social life events to residents
        vieSociale.forEach(event => {
            if (combinedData.has(event.id)) {
                combinedData.get(event.id).addVieSociale(event);
            }
        });

        // 4. Generate the table
        const table = document.createElement('table');
        table.className = 'min-w-full divide-y divide-gray-200';

        // Table header
        const thead = table.createTHead();
        thead.className = 'bg-gray-50';
        const headerRow = thead.insertRow();
        const headers = ['ID', 'Nom', 'Prénom', 'Date d\'entrée', 'Chambre', 'Projets', 'Vie Sociale'];
        headers.forEach(headerText => {
            const th = document.createElement('th');
            th.className = 'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider';
            th.textContent = headerText;
            headerRow.appendChild(th);
        });

        // Table body
        const tbody = table.createTBody();
        tbody.className = 'bg-white divide-y divide-gray-200';
        combinedData.forEach(data => {
            const row = tbody.insertRow();

            // Apply status colors
            if (data.status === 'success') {
                row.className = 'bg-green-100';
            } else if (data.status === 'warning') {
                row.className = 'bg-yellow-100';
            } else if (data.status === 'error') {
                row.className = 'bg-red-100';
            }

            const cellClasses = 'px-6 py-4 whitespace-nowrap text-sm text-gray-900';

            const idCell = row.insertCell();
            idCell.className = cellClasses;
            idCell.textContent = data.resident.id;

            const nomCell = row.insertCell();
            nomCell.className = cellClasses;
            nomCell.textContent = data.resident.Nom;

            const prenomCell = row.insertCell();
            prenomCell.className = cellClasses;
            prenomCell.textContent = data.resident.Prénom;

            const entryCell = row.insertCell();
            entryCell.className = cellClasses;
            entryCell.textContent = data.resident.entry;

            const chNumCell = row.insertCell();
            chNumCell.className = cellClasses;
            chNumCell.textContent = data.resident.chNum;

            // Projects cell
            const projetsCell = row.insertCell();
            projetsCell.className = cellClasses;
            projetsCell.innerHTML = data.projets.map(p =>
                `<div class="mb-2"><b>Type:</b> ${p.type}</div>
                 <div class="mb-2"><b>État:</b> ${p.state}</div>
                 <div><b>Du:</b> ${p.from} <b>Au:</b> ${p.to}</div>`
            ).join('<hr class="my-2">');

            // Social life cell
            const vieSocialeCell = row.insertCell();
            vieSocialeCell.className = cellClasses;
            vieSocialeCell.innerHTML = data.vieSociale.map(v =>
                `<div class="mb-2"><b>Motif:</b> ${v.type}</div>
                 <div><b>Date:</b> ${v.date}</div>`
            ).join('<hr class="my-2">');
        });

        tableContainer.appendChild(table);
    }

    // Load default data
    Promise.all([
        fetch('residents.json').then(response => response.json()),
        fetch('projets.json').then(response => response.json()),
        fetch('vie_sociale.json').then(response => response.json())
    ])
    .then(([residents, projets, vieSociale]) => {
        tableData = { residents, projets, vieSociale };
        generateTable(tableData.residents, tableData.projets, tableData.vieSociale);
    })
    .catch(error => {
        console.error('Erreur lors du chargement des données par défaut:', error);
        tableContainer.textContent = 'Erreur lors du chargement des données par défaut. Veuillez vérifier la console.';
    });

    // Handle "Voir JSON" buttons
    residentsJsonButton.addEventListener('click', () => {
        if (residentsJsonOutput.textContent) {
            residentsJsonOutput.textContent = '';
            return;
        }
        const file = residentsInput.files[0];
        if (file) {
            processResidentsFile(file)
                .then(data => {
                    tableData.residents = data;
                    residentsJsonOutput.textContent = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    residentsJsonOutput.textContent = 'Erreur lors du traitement du fichier.';
                });
        }
    });

    projetsJsonButton.addEventListener('click', () => {
        if (projetsJsonOutput.textContent) {
            projetsJsonOutput.textContent = '';
            return;
        }
        const file = projetsInput.files[0];
        if (file) {
            processProjetsFile(file)
                .then(data => {
                    tableData.projets = data;
                    projetsJsonOutput.textContent = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    projetsJsonOutput.textContent = 'Erreur lors du traitement du fichier.';
                });
        }
    });

    vieSocialeJsonButton.addEventListener('click', () => {
        if (vieSocialeJsonOutput.textContent) {
            vieSocialeJsonOutput.textContent = '';
            return;
        }
        const file = vieSocialeInput.files[0];
        if (file) {
            processVieSocialeFile(file)
                .then(data => {
                    tableData.vieSociale = data;
                    vieSocialeJsonOutput.textContent = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    vieSocialeJsonOutput.textContent = 'Erreur lors du traitement du fichier.';
                });
        }
    });

    // Handle "Générer le tableau" button
    generateTableButton.addEventListener('click', () => {
        generateTable(tableData.residents, tableData.projets, tableData.vieSociale);
    });
});
</script>
</body>
</html>
