<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Suivi des Résidents</title>
    <link rel="stylesheet" href="print.css" media="print">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="container mx-auto p-8">
        <h1 class="text-4xl font-bold text-center mb-8">Tableau de Suivi des Résidents</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <label for="residents-input" class="block text-lg font-medium text-gray-700 mb-2">Fichier Résidents (XLSX):</label>
                <div class="flex items-center">
                    <input type="file" id="residents-input" accept=".xlsx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100">
                </div>
                <div id="residents-file-info" class="text-sm mt-2"></div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <label for="projets-input" class="block text-lg font-medium text-gray-700 mb-2">Fichier Projets (XLSX):</label>
                <div class="flex items-center">
                    <input type="file" id="projets-input" accept=".xlsx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100">
                </div>
                <div id="projets-file-info" class="text-sm mt-2"></div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <label for="vie-sociale-input" class="block text-lg font-medium text-gray-700 mb-2">Fichier Vie Sociale (XLSX):</label>
                <div class="flex items-center">
                    <input type="file" id="vie-sociale-input" accept=".xlsx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100">
                </div>
                <div id="vie-sociale-file-info" class="text-sm mt-2"></div>
            </div>
        </div>

        <div class="mt-8 flex justify-center items-center space-x-4">
            <div class="flex items-center">
                <input type="checkbox" id="filter-error-switch" class="h-6 w-11 rounded-full bg-gray-300 checked:bg-red-500 appearance-none relative cursor-pointer before:content-[''] before:h-5 before:w-5 before:rounded-full before:bg-white before:shadow-md before:absolute before:top-1/2 before:left-0.5 before:-translate-y-1/2 checked:before:translate-x-full before:transition">
                <label for="filter-error-switch" class="ml-2 text-lg">Only errors</label>
            </div>
            <button id="print-table-button" class="bg-blue-500 text-white px-6 py-3 rounded-md hover:bg-blue-600 text-lg">Imprimer</button>
            <button id="export-excel-button" class="bg-green-500 text-white px-6 py-3 rounded-md hover:bg-green-600 text-lg">Export Excel</button>
        </div>

        <div id="table-container" class="mt-8 bg-white p-6 rounded-lg shadow-md"></div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="excel-processor.js"></script>
    <script src="Data.js"></script>
    <script src="script.js"></script>
</body>
</html>
